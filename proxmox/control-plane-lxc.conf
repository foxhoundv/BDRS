# Control Plane LXC (Proxmox)
# VMID: 201
# OS: Ubuntu 24.04 LTS (noble)
# Template: local:vztmpl/ubuntu-24.04-standard_24.04-2_amd64.tar.zst
# Storage: local-lvm
arch: amd64
hostname: control-plane
ostype: ubuntu
cores: 2
memory: 2048
swap: 0
rootfs: local-lvm:8
# VLAN 10 = Audio network (communicate with audio engine)
# VLAN 20 = Management (REST API, dashboard, admin access)
net0: name=eth0,bridge=vmbr0,tag=10,ip=dhcp,firewall=1
net1: name=eth1,bridge=vmbr0,tag=20,ip=dhcp,firewall=1
unprivileged: 1
onboot: 1
startup: order=1,up=5
