# Recording LXC (Proxmox)
# VMID: 202
# OS template: Ubuntu 24.04 LTS container template
arch: amd64
hostname: recording
ostype: ubuntu
cores: 6
memory: 8192
swap: 0
rootfs: local-lvm:64
# VLAN 10 = Audio network (receives PCM stream from audio engine)
# VLAN 20 = Management (recording control API, health checks)
net0: name=eth0,bridge=vmbr0,tag=10,ip=dhcp,firewall=1
net1: name=eth1,bridge=vmbr0,tag=20,ip=dhcp,firewall=1
unprivileged: 1
onboot: 1
startup: order=3,up=20
