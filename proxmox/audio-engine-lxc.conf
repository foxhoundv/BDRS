# Audio Engine LXC (Proxmox)
# VMID: 200
# OS: Ubuntu 24.04 LTS (noble)
# Template: local:vztmpl/ubuntu-24.04-standard_24.04-2_amd64.tar.zst
# Storage: local-lvm
# Network bridge: vmbr0
arch: amd64
hostname: audio-engine
ostype: ubuntu
cores: 4
cpulimit: 4
cpuunits: 2048
memory: 4096
swap: 0
rootfs: local-lvm:8
# VLAN 10 = Audio network (UDP streams, ALSA source, mDNS discovery)
net0: name=eth0,bridge=vmbr0,tag=10,ip=dhcp,firewall=1
features: nesting=0
unprivileged: 0
onboot: 1
startup: order=2,up=10
# USB/ALSA passthrough — update major:minor after running lsusb with WING connected
lxc.cgroup2.devices.allow: c 116:* rwm
lxc.mount.entry: /dev/snd dev/snd none bind,optional,create=dir
